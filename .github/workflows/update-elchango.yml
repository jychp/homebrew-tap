name: Update elChango Cask

on:
  repository_dispatch:
    types:
      - elchango-release

permissions:
  contents: read

concurrency:
  group: update-elchango-${{ github.event.client_payload.version }}
  cancel-in-progress: false

jobs:
  update:
    name: Open and auto-merge Cask update
    if: github.event.client_payload.repository == 'jychp/elchango'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
        timeout-minutes: 5

      - name: Validate release and generate Cask
        id: cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.repository }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Version must use strict SemVer"
            exit 1
          fi

          archive="elChango-${VERSION}-macos-universal.zip"
          checksum="${archive}.sha256"
          release="$(
            gh api \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "repos/${SOURCE_REPOSITORY}/releases/tags/v${VERSION}"
          )"
          if [[ "$(jq -r '.immutable' <<<"$release")" != "true" ]] ||
             [[ "$(jq -r '.draft' <<<"$release")" != "false" ]] ||
             [[ "$(jq -r '.prerelease' <<<"$release")" != "false" ]]; then
            echo "::error::Source release must be published, final, and immutable"
            exit 1
          fi

          archive_count="$(
            jq --arg name "$archive" \
              '[.assets[] | select(.name == $name)] | length' <<<"$release"
          )"
          checksum_count="$(
            jq --arg name "$checksum" \
              '[.assets[] | select(.name == $name)] | length' <<<"$release"
          )"
          if [[ "$archive_count" != "1" || "$checksum_count" != "1" ]]; then
            echo "::error::Immutable release must contain exactly one archive and checksum asset"
            exit 1
          fi

          work_directory="$(mktemp -d)"
          trap 'rm -rf "$work_directory"' EXIT
          archive_id="$(
            jq -r --arg name "$archive" \
              '.assets[] | select(.name == $name) | .id' <<<"$release"
          )"
          checksum_id="$(
            jq -r --arg name "$checksum" \
              '.assets[] | select(.name == $name) | .id' <<<"$release"
          )"
          archive_digest="$(
            jq -r --arg name "$archive" \
              '.assets[] | select(.name == $name) | .digest' <<<"$release"
          )"
          checksum_digest="$(
            jq -r --arg name "$checksum" \
              '.assets[] | select(.name == $name) | .digest' <<<"$release"
          )"
          gh api -H "Accept: application/octet-stream" \
            "repos/${SOURCE_REPOSITORY}/releases/assets/${archive_id}" \
            > "$work_directory/$archive"
          gh api -H "Accept: application/octet-stream" \
            "repos/${SOURCE_REPOSITORY}/releases/assets/${checksum_id}" \
            > "$work_directory/$checksum"

          expected="$(
            awk -v archive="$archive" \
              '$2 == archive {print $1}' \
              "$work_directory/$checksum"
          )"
          actual="$(
            sha256sum "$work_directory/$archive" |
              awk '{print $1}'
          )"
          actual_checksum="$(
            sha256sum "$work_directory/$checksum" |
              awk '{print $1}'
          )"
          if [[ "$archive_digest" != "sha256:${actual}" ]] ||
             [[ "$checksum_digest" != "sha256:${actual_checksum}" ]] ||
             [[ ! "$expected" =~ ^[0-9a-f]{64}$ ]] ||
             [[ "$actual" != "$expected" ]]; then
            echo "::error::Published macOS checksum is invalid"
            exit 1
          fi
          if ! unzip -Z1 "$work_directory/$archive" |
               awk '$0 == "elChango.app/Contents/Info.plist" {found = 1}
                    END {exit found ? 0 : 1}'; then
            echo "::error::Archive does not contain elChango.app"
            exit 1
          fi

          python3 .github/scripts/update_elchango_cask.py \
            --version "$VERSION" \
            --sha256 "$actual"
          python3 .github/scripts/test_update_elchango_cask.py

          if [[ -z "$(git status --porcelain -- Casks/elchango.rb)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "branch=automation/elchango-v${VERSION}" >> "$GITHUB_OUTPUT"
          fi
        timeout-minutes: 10

      - name: Create update pull request
        if: steps.cask.outputs.changed == 'true'
        id: pull-request
        env:
          BRANCH: ${{ steps.cask.outputs.branch }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          existing="$(
            gh pr list \
              --head "$BRANCH" \
              --state open \
              --json url \
              --jq '.[0].url // ""'
          )"
          if [[ -n "$existing" ]]; then
            echo "url=$existing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            BRANCH="${BRANCH}-${GITHUB_RUN_ID}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add Casks/elchango.rb
          git commit -m "elchango ${VERSION}"

          askpass="$RUNNER_TEMP/elchango-git-askpass"
          trap 'rm -f "$askpass"' EXIT
          cat > "$askpass" <<'EOF'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' x-access-token ;;
            *Password*) printf '%s\n' "$GH_TOKEN" ;;
          esac
          EOF
          chmod 700 "$askpass"
          GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 \
            git push --set-upstream origin "$BRANCH"

          url="$(
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "elchango ${VERSION}" \
              --body "Update the elChango Cask from the signed and notarized v${VERSION} GitHub release."
          )"
          echo "url=$url" >> "$GITHUB_OUTPUT"
        timeout-minutes: 5

      - name: Enable auto-merge
        if: steps.pull-request.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PULL_REQUEST_URL: ${{ steps.pull-request.outputs.url }}
        run: gh pr merge --auto --squash --delete-branch "$PULL_REQUEST_URL"
        timeout-minutes: 2
